<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - DAV Public School</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen p-3 md:p-6 select-none">

    <div class="max-w-6xl mx-auto space-y-4">

        <!-- 1. LOGIN SECTION -->
        <div id="login-section" class="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-200 max-w-md mx-auto space-y-4 my-10">
            <div class="text-center">
                <h1 class="text-xl font-black text-blue-900 tracking-wide">DAV PUBLIC SCHOOL</h1>
                <p class="text-xs text-gray-500 font-bold">Admin Central Control Panel</p>
            </div>
            <form onsubmit="handleAdminLogin(event)" class="space-y-3 text-xs">
                <div>
                    <label class="block font-bold text-gray-700 mb-1">Admin ID</label>
                    <input type="text" id="a-user" placeholder="Enter Admin Username" required class="w-full p-2.5 border rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 font-semibold">
                </div>
                <div>
                    <label class="block font-bold text-gray-700 mb-1">Password</label>
                    <input type="password" id="a-pass" placeholder="Enter Password" required class="w-full p-2.5 border rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-900 hover:bg-black text-white font-bold py-2.5 rounded-lg shadow transition">
                    🔐 Admin Login
                </button>
            </form>
        </div>

        <!-- 2. MAIN ADMIN DASHBOARD -->
        <div id="dashboard-section" class="hidden space-y-4">

            <!-- Top Header Bar with Logout (ONLY ADDITION) -->
            <div class="bg-white p-4 rounded-xl shadow border flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-black text-blue-900">DAV Admin Console</h2>
                    <p class="text-xs text-gray-500 font-semibold">Exam Timing, Activation & Master Controls</p>
                </div>
                <!-- 🚪 LOGOUT BUTTON -->
                <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-600 text-white font-bold text-xs px-4 py-2 rounded-lg shadow transition flex items-center gap-1.5">
                    🚪 Logout
                </button>
            </div>

            <!-- EXAM CONTROL SETTINGS -->
            <div class="bg-white p-5 rounded-xl shadow border space-y-4">
                <h3 class="font-bold text-sm text-blue-900 border-b pb-2">⚙️ Exam Activation & Time Settings</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Target Class</label>
                        <select id="ctrl-class" class="w-full p-2.5 border rounded-lg bg-slate-50 font-bold text-blue-900">
                            <option value="Class 8">Class 8th</option>
                            <option value="Class 9">Class 9th</option>
                            <option value="Class 10" selected>Class 10th</option>
                            <option value="Class 11">Class 11th</option>
                            <option value="Class 12">Class 12th</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Exam Duration (Minutes)</label>
                        <input type="number" id="ctrl-duration" value="30" class="w-full p-2.5 border rounded-lg bg-slate-50 font-bold">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Exam Status</label>
                        <select id="ctrl-status" class="w-full p-2.5 border rounded-lg bg-slate-50 font-bold">
                            <option value="true">🟢 Active (Students Can Login)</option>
                            <option value="false">🔴 Inactive (Exam Closed)</option>
                        </select>
                    </div>
                </div>

                <button onclick="saveExamSettings()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs py-2.5 px-6 rounded-lg shadow transition">
                    💾 Save Exam Settings for Class
                </button>
            </div>

        </div>

    </div>

    <!-- Firebase Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi63JHOSRmn58ccbSOg82sJUOXUtTsumo",
            authDomain: "myexamportal-abf3f.firebaseapp.com",
            projectId: "myexamportal-abf3f",
            storageBucket: "myexamportal-abf3f.firebasestorage.app",
            messagingSenderId: "8464475917",
            appId: "1:8464475917:web:dd31ca0bba84a56ae17244"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function handleAdminLogin(e) {
            e.preventDefault();
            const user = document.getElementById('a-user').value.trim();
            const pass = document.getElementById('a-pass').value.trim();

            if (user === "admin" && pass === "davadmin123") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
            } else {
                alert("❌ Invalid Admin Credentials!");
            }
        }

        function saveExamSettings() {
            const targetClass = document.getElementById('ctrl-class').value;
            const duration = parseInt(document.getElementById('ctrl-duration').value) || 30;
            const statusVal = document.getElementById('ctrl-status').value === "true"; // Strict boolean

            db.collection("exam_control").doc(targetClass).set({
                class: targetClass,
                duration: duration,
                isActive: statusVal,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert(`✅ Settings updated for ${targetClass}!\nStatus: ${statusVal ? 'ACTIVE' : 'INACTIVE'}\nDuration: ${duration} Mins`);
            }).catch(err => {
                alert("Error saving settings: " + err.message);
            });
        }

        // LOGOUT LOGIC
        function handleLogout() {
            if (confirm("Are you sure you want to LOGOUT from Admin Console?")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
