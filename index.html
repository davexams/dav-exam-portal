<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Online Exam Portal - DAV Public School</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen p-2 md:p-4 select-none">

    <div class="max-w-7xl mx-auto space-y-3">

        <!-- 1. LOGIN SECTION -->
        <div id="login-section" class="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-200 max-w-md mx-auto space-y-5 my-10">
            <div class="text-center">
                <h1 class="text-2xl font-black text-blue-900 tracking-wide">DAV PUBLIC SCHOOL</h1>
                <p class="text-xs text-gray-500 font-semibold mt-1">Student CBT Assessment Portal</p>
            </div>

            <form onsubmit="handleStudentLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Class</label>
                    <select id="login-class" required class="w-full p-2.5 border rounded-lg text-xs font-bold text-blue-900 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500">
                        <option value="Class 8">Class 8th</option>
                        <option value="Class 9">Class 9th</option>
                        <option value="Class 10" selected>Class 10th</option>
                        <option value="Class 11">Class 11th</option>
                        <option value="Class 12">Class 12th</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Roll Number / ID</label>
                    <input type="text" id="login-roll" placeholder="Enter Roll No" required class="w-full p-2.5 border rounded-lg text-xs bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 font-semibold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Password</label>
                    <input type="password" id="login-password" placeholder="Enter Password" required class="w-full p-2.5 border rounded-lg text-xs bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-xs shadow-md transition">
                    🚀 Login to Test Portal
                </button>
            </form>
        </div>

        <!-- 2. NTA STYLE CBT EXAM INTERFACE SECTION -->
        <div id="exam-section" class="hidden space-y-3">

            <!-- Top Header & Timer Bar -->
            <div class="bg-white p-3 rounded-xl shadow border flex flex-wrap justify-between items-center gap-2">
                <div>
                    <h2 class="text-base font-black text-blue-900" id="display-student-name">Student Portal</h2>
                    <p class="text-xs text-gray-500 font-bold" id="display-student-info">Class 10 | Roll: --</p>
                </div>
                <div class="bg-amber-100 border border-amber-300 px-4 py-1.5 rounded-xl text-center">
                    <p class="text-[9px] uppercase font-bold text-amber-800">Time Remaining</p>
                    <p class="text-lg font-black text-amber-900 font-mono" id="timer-display">00:00</p>
                </div>
            </div>

            <!-- Subject Navigation Tabs -->
            <div class="bg-white p-2.5 rounded-xl shadow border flex items-center gap-2 overflow-x-auto">
                <span class="text-[11px] font-bold text-gray-500 uppercase whitespace-nowrap pl-1">Sections:</span>
                <div class="flex gap-1.5" id="subject-tabs-container"></div>
            </div>

            <!-- Main Layout: Question Box + Side Palette Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-3">

                <!-- Left Panel: Current Active Question Box -->
                <div class="lg:col-span-3 bg-white p-5 rounded-xl shadow border flex flex-col justify-between min-h-[460px]">
                    <div>
                        <!-- Question Header -->
                        <div class="flex justify-between items-center border-b pb-2 mb-3">
                            <span class="text-xs font-bold text-blue-900 bg-blue-100 px-3 py-1 rounded-full" id="q-number-title">Question #1</span>
                            <div class="flex gap-1.5">
                                <span class="text-[10px] font-bold bg-blue-600 text-white px-2 py-0.5 rounded uppercase" id="q-subject-badge">Subject</span>
                                <span class="text-[10px] font-bold bg-gray-200 text-gray-700 px-2 py-0.5 rounded" id="q-chapter-badge">Chapter</span>
                            </div>
                        </div>

                        <!-- Question Text -->
                        <div class="space-y-4">
                            <p class="text-sm md:text-base font-bold text-gray-800 leading-relaxed" id="q-text-body">Loading question...</p>

                            <!-- Options Container -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-2.5 text-xs pt-2" id="q-options-container"></div>
                        </div>
                    </div>

                    <!-- Bottom Action Bar -->
                    <div class="border-t pt-4 mt-6 flex flex-wrap justify-between items-center gap-2">
                        <div class="flex gap-2">
                            <button onclick="markForReview()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold text-xs py-2 px-3 rounded shadow transition">
                                🟣 Mark for Review & Next
                            </button>
                            <button onclick="clearResponse()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold text-xs py-2 px-3 rounded transition">
                                🧹 Clear Response
                            </button>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="nextQuestion()" class="bg-amber-500 hover:bg-amber-600 text-white font-bold text-xs py-2 px-3 rounded shadow transition">
                                ⏩ Skip / Next
                            </button>
                            <button onclick="saveAndNext()" class="bg-green-600 hover:bg-green-700 text-white font-bold text-xs py-2 px-4 rounded shadow transition">
                                💾 Save & Next
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Question Palette Grid & Legend -->
                <div class="bg-white p-4 rounded-xl shadow border space-y-4 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-gray-800 text-xs border-b pb-2 mb-3">🎯 Question Palette</h3>
                        
                        <!-- Grid Palette Buttons -->
                        <div class="grid grid-cols-5 gap-1.5 max-h-[260px] overflow-y-auto p-1" id="question-palette-grid"></div>
                    </div>

                    <!-- Legend Information -->
                    <div class="space-y-3 border-t pt-3">
                        <div class="grid grid-cols-2 gap-1.5 text-[10px] font-semibold text-gray-600">
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-emerald-600 inline-block"></span> Answered</div>
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-purple-600 inline-block"></span> Review</div>
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-amber-500 inline-block"></span> Ans & Review</div>
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-gray-200 inline-block"></span> Not Visited</div>
                        </div>

                        <button onclick="submitExamPaper()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2.5 rounded-lg shadow transition">
                            ✅ Submit Test Paper
                        </button>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Firebase Script Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi63JHOSRmn58ccbSOg82sJUOXUtTsumo",
            authDomain: "myexamportal-abf3f.firebaseapp.com",
            projectId: "myexamportal-abf3f",
            storageBucket: "myexamportal-abf3f.firebasestorage.app",
            messagingSenderId: "8464475917",
            appId: "1:8464475917:web:dd31ca0bba84a56ae17244"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let loggedInStudent = null;
        let examQuestionsList = [];
        let studentAnswersMap = {};
        let questionStatusMap = {};
        let currentIndex = 0;
        let activeSubjectFilter = "ALL";
        let timerInterval = null;

        function handleStudentLogin(e) {
            e.preventDefault();
            const roll = document.getElementById('login-roll').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            const targetClass = document.getElementById('login-class').value;

            db.collection("students")
                .where("rollNo", "==", roll)
                .where("class", "==", targetClass)
                .where("password", "==", pass)
                .get()
                .then(snapshot => {
                    if (snapshot.empty) {
                        return alert("❌ Invalid Roll Number, Password, or Class Selection!");
                    }

                    snapshot.forEach(doc => {
                        loggedInStudent = doc.data();
                        loggedInStudent.id = doc.id;
                    });

                    checkExamStatusAndStart(targetClass);
                });
        }

        function checkExamStatusAndStart(targetClass) {
            db.collection("exam_control").doc(targetClass).get().then(doc => {
                if (!doc.exists) {
                    return alert(`🔴 Exam settings for ${targetClass} have not been configured by Admin yet!`);
                }

                const examMeta = doc.data();
                const isExamActive = (examMeta.isActive === true || examMeta.isActive === "true");

                if (!isExamActive) {
                    return alert(`🔴 Exam for ${targetClass} is currently NOT ACTIVE! Please contact your teacher.`);
                }

                db.collection("exam_attempts")
                    .where("rollNo", "==", loggedInStudent.rollNo)
                    .where("class", "==", targetClass)
                    .get()
                    .then(attemptSnap => {
                        if (!attemptSnap.empty) {
                            return alert("⚠️ You have ALREADY SUBMITTED this exam! Re-attempts are not allowed.");
                        }

                        fetchExamQuestions(targetClass, examMeta);
                    });
            });
        }

        function fetchExamQuestions(targetClass, examMeta) {
            db.collection("question_bank")
                .where("class", "==", targetClass)
                .where("selectedForExam", "==", true)
                .get()
                .then(snapshot => {
                    if (snapshot.empty) {
                        return alert(`No questions deployed for ${targetClass} yet.`);
                    }

                    examQuestionsList = [];
                    studentAnswersMap = {};
                    questionStatusMap = {};

                    snapshot.forEach(doc => {
                        const q = doc.data();
                        q.id = doc.id;
                        examQuestionsList.push(q);
                    });

                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('exam-section').classList.remove('hidden');

                    document.getElementById('display-student-name').innerText = loggedInStudent.name;
                    document.getElementById('display-student-info').innerText = `${loggedInStudent.class} | Roll: ${loggedInStudent.rollNo}`;

                    currentIndex = 0;
                    buildSubjectTabs();
                    loadActiveQuestion();
                    renderPaletteGrid();
                    startTimer(examMeta.duration || 30);
                });
        }

        function buildSubjectTabs() {
            const tabsContainer = document.getElementById('subject-tabs-container');
            tabsContainer.innerHTML = `
                <button onclick="filterBySubject('ALL')" id="tab-ALL" class="subj-tab bg-blue-600 text-white font-bold text-xs px-3 py-1 rounded-lg shadow transition">
                    ALL (${examQuestionsList.length})
                </button>
            `;

            const subjectsSet = new Set();
            examQuestionsList.forEach(q => { 
                if (q.subject && q.subject.trim()) {
                    subjectsSet.add(q.subject.trim()); 
                }
            });

            subjectsSet.forEach(subj => {
                const count = examQuestionsList.filter(q => (q.subject || '').trim().toLowerCase() === subj.toLowerCase()).length;
                tabsContainer.innerHTML += `
                    <button onclick="filterBySubject('${subj}')" id="tab-${subj.replace(/\s+/g, '')}" class="subj-tab bg-slate-200 hover:bg-blue-100 text-gray-700 font-bold text-xs px-3 py-1 rounded-lg transition">
                        ${subj} (${count})
                    </button>
                `;
            });
        }

        // 🎯 STRICT SUBJECT FILTER LOGIC
        function filterBySubject(subjName) {
            activeSubjectFilter = subjName;

            document.querySelectorAll('.subj-tab').forEach(btn => {
                btn.className = "subj-tab bg-slate-200 hover:bg-blue-100 text-gray-700 font-bold text-xs px-3 py-1 rounded-lg transition";
            });

            const activeBtn = document.getElementById(`tab-${subjName.replace(/\s+/g, '')}`);
            if (activeBtn) activeBtn.className = "subj-tab bg-blue-600 text-white font-bold text-xs px-3 py-1 rounded-lg shadow transition";

            if (subjName === "ALL") {
                currentIndex = 0;
            } else {
                const firstIdx = examQuestionsList.findIndex(q => (q.subject || '').trim().toLowerCase() === subjName.trim().toLowerCase());
                if (firstIdx !== -1) {
                    currentIndex = firstIdx;
                }
            }

            loadActiveQuestion();
            renderPaletteGrid();
        }

        function loadActiveQuestion() {
            if (examQuestionsList.length === 0) return;
            const q = examQuestionsList[currentIndex];

            if (!questionStatusMap[q.id]) {
                questionStatusMap[q.id] = 'visited';
            }

            document.getElementById('q-number-title').innerText = `Question #${currentIndex + 1} of ${examQuestionsList.length}`;
            document.getElementById('q-subject-badge').innerText = q.subject || 'General';
            document.getElementById('q-chapter-badge').innerText = q.chapter || 'Chapter';
            document.getElementById('q-text-body').innerText = q.question;

            const opts = q.options || { A: q.optionA, B: q.optionB, C: q.optionC, D: q.optionD };
            const selectedOpt = studentAnswersMap[q.id] || "";

            const optsContainer = document.getElementById('q-options-container');
            optsContainer.innerHTML = "";

            ['A', 'B', 'C', 'D'].forEach(key => {
                optsContainer.innerHTML += `
                    <label class="flex items-center gap-2.5 p-3 rounded-xl border cursor-pointer bg-slate-50 hover:bg-blue-50 transition ${selectedOpt === key ? 'border-blue-600 bg-blue-50 font-bold text-blue-900 ring-2 ring-blue-400' : 'text-gray-700'}">
                        <input type="radio" name="current-opt" value="${key}" ${selectedOpt === key ? 'checked' : ''} onchange="selectOption('${key}')" class="text-blue-600 focus:ring-blue-500 w-4 h-4">
                        <span><b>(${key})</b> ${opts[key] || ''}</span>
                    </label>
                `;
            });

            renderPaletteGrid();
        }

        function selectOption(key) {
            const qId = examQuestionsList[currentIndex].id;
            studentAnswersMap[qId] = key;
        }

        function saveAndNext() {
            const qId = examQuestionsList[currentIndex].id;
            if (studentAnswersMap[qId]) {
                questionStatusMap[qId] = 'answered';
            } else {
                questionStatusMap[qId] = 'visited';
            }
            goToNextInSubject();
        }

        function markForReview() {
            const qId = examQuestionsList[currentIndex].id;
            if (studentAnswersMap[qId]) {
                questionStatusMap[qId] = 'answered-review';
            } else {
                questionStatusMap[qId] = 'review';
            }
            goToNextInSubject();
        }

        function clearResponse() {
            const qId = examQuestionsList[currentIndex].id;
            delete studentAnswersMap[qId];
            questionStatusMap[qId] = 'visited';
            loadActiveQuestion();
        }

        function nextQuestion() {
            goToNextInSubject();
        }

        // Helper to navigate sequentially or within current filtered subject
        function goToNextInSubject() {
            if (activeSubjectFilter === "ALL") {
                if (currentIndex < examQuestionsList.length - 1) {
                    currentIndex++;
                    loadActiveQuestion();
                } else {
                    alert("You have reached the last question of the exam.");
                    renderPaletteGrid();
                }
            } else {
                // Find next question in current subject
                const nextIdx = examQuestionsList.findIndex((q, i) => i > currentIndex && (q.subject || '').trim().toLowerCase() === activeSubjectFilter.trim().toLowerCase());
                if (nextIdx !== -1) {
                    currentIndex = nextIdx;
                    loadActiveQuestion();
                } else {
                    alert(`You have reached the end of ${activeSubjectFilter} section.`);
                    renderPaletteGrid();
                }
            }
        }

        function jumpToQuestion(idx) {
            currentIndex = idx;
            loadActiveQuestion();
        }

        // 🎯 PALETTE GRID ACCORDING TO SUBJECT FILTER
        function renderPaletteGrid() {
            const grid = document.getElementById('question-palette-grid');
            grid.innerHTML = "";

            examQuestionsList.forEach((q, idx) => {
                const qSubj = (q.subject || '').trim().toLowerCase();
                const selSubj = activeSubjectFilter.trim().toLowerCase();

                // Skip non-matching subjects if a specific section is selected
                if (activeSubjectFilter !== "ALL" && qSubj !== selSubj) {
                    return;
                }

                const status = questionStatusMap[q.id] || 'not-visited';
                const isCurrent = (idx === currentIndex);

                let btnClass = "bg-gray-200 text-gray-700 border-gray-300";

                if (status === 'answered') btnClass = "bg-emerald-600 text-white font-bold";
                else if (status === 'review') btnClass = "bg-purple-600 text-white font-bold";
                else if (status === 'answered-review') btnClass = "bg-amber-500 text-white font-bold";
                else if (status === 'visited') btnClass = "bg-red-100 text-red-700 border-red-300 font-bold";

                let ringClass = isCurrent ? 'ring-2 ring-blue-900 ring-offset-1 scale-105 z-10 font-black' : '';

                grid.innerHTML += `
                    <button onclick="jumpToQuestion(${idx})" class="w-8 h-8 rounded-lg text-xs flex items-center justify-center transition ${btnClass} ${ringClass}">
                        ${idx + 1}
                    </button>
                `;
            });
        }

        function startTimer(durationMins) {
            let totalSeconds = durationMins * 60;
            const timerDisplay = document.getElementById('timer-display');

            timerInterval = setInterval(() => {
                let mins = Math.floor(totalSeconds / 60);
                let secs = totalSeconds % 60;

                timerDisplay.innerText = `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    alert("⏰ Time is UP! Submitting your exam automatically...");
                    submitExamPaper();
                }
                totalSeconds--;
            }, 1000);
        }

        function submitExamPaper() {
            if (confirm("Are you sure you want to SUBMIT your complete exam paper?")) {
                if (timerInterval) clearInterval(timerInterval);

                const payload = {
                    rollNo: loggedInStudent.rollNo,
                    studentName: loggedInStudent.name,
                    class: loggedInStudent.class,
                    answers: studentAnswersMap,
                    totalQuestions: examQuestionsList.length,
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                db.collection("exam_attempts").add(payload).then(() => {
                    alert("🎉 Exam Submitted Successfully! Thank you.");
                    location.reload();
                }).catch(err => {
                    console.error("Submission Error:", err);
                    alert("Failed to submit exam. Please try again.");
                });
            }
        }
    </script>
</body>
</html>
