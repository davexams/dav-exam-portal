<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Online Exam Portal - DAV Public School</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen p-3 md:p-6 select-none">

    <div class="max-w-5xl mx-auto space-y-4">

        <!-- 1. LOGIN SECTION -->
        <div id="login-section" class="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-200 max-w-md mx-auto space-y-5">
            <div class="text-center">
                <h1 class="text-2xl font-black text-blue-900 tracking-wide">DAV PUBLIC SCHOOL</h1>
                <p class="text-xs text-gray-500 font-semibold mt-1">Student CBT Assessment Portal</p>
            </div>

            <form onsubmit="handleStudentLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Class</label>
                    <select id="login-class" required class="w-full p-2.5 border rounded-lg text-xs font-bold text-blue-900 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500">
                        <option value="Class 8">Class 8th</option>
                        <option value="Class 9">Class 9th</option>
                        <option value="Class 10" selected>Class 10th</option>
                        <option value="Class 11">Class 11th</option>
                        <option value="Class 12">Class 12th</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Roll Number / ID</label>
                    <input type="text" id="login-roll" placeholder="Enter Roll No" required class="w-full p-2.5 border rounded-lg text-xs bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 font-semibold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Password</label>
                    <input type="password" id="login-password" placeholder="Enter Password" required class="w-full p-2.5 border rounded-lg text-xs bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-xs shadow-md transition">
                    🚀 Login to Test Portal
                </button>
            </form>
        </div>

        <!-- 2. EXAM INTERFACE SECTION (Hidden by default) -->
        <div id="exam-section" class="hidden space-y-4">

            <!-- Top Header & Timer Bar -->
            <div class="bg-white p-4 rounded-xl shadow border flex flex-wrap justify-between items-center gap-2">
                <div>
                    <h2 class="text-lg font-black text-blue-900" id="display-student-name">Student Portal</h2>
                    <p class="text-xs text-gray-500 font-bold" id="display-student-info">Class 10 | Roll: --</p>
                </div>
                <div class="bg-amber-100 border border-amber-300 px-4 py-2 rounded-xl text-center">
                    <p class="text-[10px] uppercase font-bold text-amber-800">Time Remaining</p>
                    <p class="text-xl font-black text-amber-900 font-mono" id="timer-display">00:00</p>
                </div>
            </div>

            <!-- 🎯 SUBJECT FILTER TABS -->
            <div class="bg-white p-3 rounded-xl shadow border space-y-2">
                <p class="text-[11px] font-bold text-gray-500 uppercase tracking-wide">Choose Subject Section:</p>
                <div class="flex flex-wrap gap-2" id="subject-tabs-container">
                    <button onclick="filterBySubject('ALL')" class="subj-tab bg-blue-600 text-white font-bold text-xs px-3.5 py-1.5 rounded-lg shadow transition">
                        ALL
                    </button>
                </div>
            </div>

            <!-- Question Paper List Container -->
            <div class="bg-white p-5 rounded-xl shadow border space-y-4 min-h-[350px]">
                <div class="flex justify-between items-center border-b pb-2">
                    <span class="text-xs font-bold text-gray-600" id="showing-subject-label">Showing: All Subjects</span>
                    <span class="text-xs font-bold text-blue-700 bg-blue-50 px-2.5 py-1 rounded-full" id="attempted-counter">Attempted: 0 / 0</span>
                </div>

                <div class="space-y-4 max-h-[500px] overflow-y-auto pr-1" id="questions-list-container">
                    <p class="text-center text-xs text-gray-400 py-6">Loading exam paper...</p>
                </div>

                <div class="border-t pt-4 flex justify-between items-center">
                    <p class="text-[11px] text-gray-400">Ensure all answers are checked before submitting.</p>
                    <button onclick="submitExamPaper()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2.5 px-6 rounded-lg shadow transition">
                        ✅ Submit Complete Exam
                    </button>
                </div>
            </div>

        </div>

    </div>

    <!-- Firebase Script Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi63JHOSRmn58ccbSOg82sJUOXUtTsumo",
            authDomain: "myexamportal-abf3f.firebaseapp.com",
            projectId: "myexamportal-abf3f",
            storageBucket: "myexamportal-abf3f.firebasestorage.app",
            messagingSenderId: "8464475917",
            appId: "1:8464475917:web:dd31ca0bba84a56ae17244"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let loggedInStudent = null;
        let examQuestionsList = [];
        let studentAnswersMap = {};
        let activeSubjectFilter = "ALL";
        let timerInterval = null;

        function handleStudentLogin(e) {
            e.preventDefault();
            const roll = document.getElementById('login-roll').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            const targetClass = document.getElementById('login-class').value;

            db.collection("students")
                .where("rollNo", "==", roll)
                .where("class", "==", targetClass)
                .where("password", "==", pass)
                .get()
                .then(snapshot => {
                    if (snapshot.empty) {
                        return alert("❌ Invalid Roll Number, Password, or Class Selection!");
                    }

                    snapshot.forEach(doc => {
                        loggedInStudent = doc.data();
                        loggedInStudent.id = doc.id;
                    });

                    checkExamStatusAndStart(targetClass);
                });
        }

        // 🎯 FIX: ACTIVE STATUS CHECK LOGIC FOR BOTH BOOLEAN & STRING
        function checkExamStatusAndStart(targetClass) {
            db.collection("exam_control").doc(targetClass).get().then(doc => {
                if (!doc.exists) {
                    return alert(`🔴 Exam settings for ${targetClass} have not been configured by Admin yet!`);
                }

                const examMeta = doc.data();
                
                // Flexible check for true or "true"
                const isExamActive = (examMeta.isActive === true || examMeta.isActive === "true");

                if (!isExamActive) {
                    return alert(`🔴 Exam for ${targetClass} is currently NOT ACTIVE! Please contact your teacher.`);
                }

                // Check if already attempted
                db.collection("exam_attempts")
                    .where("rollNo", "==", loggedInStudent.rollNo)
                    .where("class", "==", targetClass)
                    .get()
                    .then(attemptSnap => {
                        if (!attemptSnap.empty) {
                            return alert("⚠️ You have ALREADY SUBMITTED this exam! Re-attempts are not allowed.");
                        }

                        // Load Questions for this Class
                        fetchExamQuestions(targetClass, examMeta);
                    });
            });
        }

        function fetchExamQuestions(targetClass, examMeta) {
            db.collection("question_bank")
                .where("class", "==", targetClass)
                .where("selectedForExam", "==", true)
                .get()
                .then(snapshot => {
                    if (snapshot.empty) {
                        return alert(`No questions deployed for ${targetClass} yet.`);
                    }

                    examQuestionsList = [];
                    studentAnswersMap = {};

                    snapshot.forEach(doc => {
                        const q = doc.data();
                        q.id = doc.id;
                        examQuestionsList.push(q);
                    });

                    // Hide Login, Show Exam Interface
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('exam-section').classList.remove('hidden');

                    document.getElementById('display-student-name').innerText = loggedInStudent.name;
                    document.getElementById('display-student-info').innerText = `${loggedInStudent.class} | Roll: ${loggedInStudent.rollNo}`;

                    buildSubjectTabs();
                    renderQuestionList();
                    startTimer(examMeta.duration || 30);
                });
        }

        // BUILD SUBJECT TABS DYNAMICALLY
        function buildSubjectTabs() {
            const tabsContainer = document.getElementById('subject-tabs-container');
            tabsContainer.innerHTML = `
                <button onclick="filterBySubject('ALL')" id="tab-ALL" class="subj-tab bg-blue-600 text-white font-bold text-xs px-3.5 py-1.5 rounded-lg shadow transition">
                    ALL (${examQuestionsList.length})
                </button>
            `;

            const subjectsSet = new Set();
            examQuestionsList.forEach(q => {
                if (q.subject) subjectsSet.add(q.subject.trim());
            });

            subjectsSet.forEach(subj => {
                const count = examQuestionsList.filter(q => q.subject === subj).length;
                tabsContainer.innerHTML += `
                    <button onclick="filterBySubject('${subj}')" id="tab-${subj.replace(/\s+/g, '')}" class="subj-tab bg-slate-200 hover:bg-blue-100 text-gray-700 font-bold text-xs px-3.5 py-1.5 rounded-lg transition">
                        ${subj} (${count})
                    </button>
                `;
            });
        }

        // FILTER QUESTIONS BY SUBJECT
        function filterBySubject(subjName) {
            activeSubjectFilter = subjName;
            document.getElementById('showing-subject-label').innerText = `Showing: ${subjName === 'ALL' ? 'All Subjects' : subjName}`;

            document.querySelectorAll('.subj-tab').forEach(btn => {
                btn.className = "subj-tab bg-slate-200 hover:bg-blue-100 text-gray-700 font-bold text-xs px-3.5 py-1.5 rounded-lg transition";
            });

            const activeBtn = document.getElementById(`tab-${subjName.replace(/\s+/g, '')}`);
            if (activeBtn) {
                activeBtn.className = "subj-tab bg-blue-600 text-white font-bold text-xs px-3.5 py-1.5 rounded-lg shadow transition";
            }

            renderQuestionList();
        }

        function renderQuestionList() {
            const container = document.getElementById('questions-list-container');
            container.innerHTML = "";

            const filteredQuestions = activeSubjectFilter === "ALL" 
                ? examQuestionsList 
                : examQuestionsList.filter(q => q.subject === activeSubjectFilter);

            if (filteredQuestions.length === 0) {
                container.innerHTML = `<p class="text-center text-xs text-gray-400 py-6">No questions found in this section.</p>`;
                return;
            }

            filteredQuestions.forEach((q, index) => {
                const globalIndex = examQuestionsList.findIndex(item => item.id === q.id) + 1;
                const opts = q.options || { A: q.optionA, B: q.optionB, C: q.optionC, D: q.optionD };
                const selectedOpt = studentAnswersMap[q.id] || "";

                container.innerHTML += `
                    <div class="p-4 border rounded-xl bg-slate-50 hover:bg-blue-50/20 transition space-y-3">
                        <div class="flex justify-between items-center border-b pb-2">
                            <span class="text-xs font-bold text-blue-900 bg-blue-100 px-2.5 py-0.5 rounded">Q#${globalIndex}</span>
                            <div class="flex gap-1.5">
                                <span class="text-[10px] font-bold bg-blue-600 text-white px-2 py-0.5 rounded uppercase">${q.subject || 'General'}</span>
                                <span class="text-[10px] font-bold bg-gray-200 text-gray-700 px-2 py-0.5 rounded">${q.chapter || 'Chapter'}</span>
                            </div>
                        </div>

                        <p class="text-xs md:text-sm font-bold text-gray-800 leading-relaxed">${q.question}</p>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs pt-1">
                            ${['A', 'B', 'C', 'D'].map(key => `
                                <label class="flex items-center gap-2 p-2 rounded-lg border cursor-pointer bg-white hover:bg-blue-50 transition ${selectedOpt === key ? 'border-blue-600 bg-blue-50/80 font-bold text-blue-900' : 'text-gray-700'}">
                                    <input type="radio" name="opt-${q.id}" value="${key}" ${selectedOpt === key ? 'checked' : ''} onchange="recordAnswer('${q.id}', '${key}')" class="text-blue-600 focus:ring-blue-500">
                                    <span><b>(${key})</b> ${opts[key] || ''}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            updateAttemptCounter();
        }

        function recordAnswer(qId, selectedKey) {
            studentAnswersMap[qId] = selectedKey;
            updateAttemptCounter();
        }

        function updateAttemptCounter() {
            const count = Object.keys(studentAnswersMap).length;
            document.getElementById('attempted-counter').innerText = `Attempted: ${count} / ${examQuestionsList.length}`;
        }

        function startTimer(durationMins) {
            let totalSeconds = durationMins * 60;
            const timerDisplay = document.getElementById('timer-display');

            timerInterval = setInterval(() => {
                let mins = Math.floor(totalSeconds / 60);
                let secs = totalSeconds % 60;

                timerDisplay.innerText = `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    alert("⏰ Time is UP! Submitting your exam automatically...");
                    submitExamPaper();
                }
                totalSeconds--;
            }, 1000);
        }

        function submitExamPaper() {
            if (timerInterval) clearInterval(timerInterval);

            const payload = {
                rollNo: loggedInStudent.rollNo,
                studentName: loggedInStudent.name,
                class: loggedInStudent.class,
                answers: studentAnswersMap,
                totalQuestions: examQuestionsList.length,
                submittedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection("exam_attempts").add(payload).then(() => {
                alert("🎉 Exam Submitted Successfully! Thank you.");
                location.reload();
            }).catch(err => {
                console.error("Submission Error:", err);
                alert("Failed to submit exam. Please try again.");
            });
        }
    </script>
</body>
</html>
