<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - DAV Public School</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- STEP 1: STUDENT LOGIN SCREEN -->
    <div id="student-login-container" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold text-center text-blue-700 mb-2">DAV Student Online Exam</h2>
            <p class="text-xs text-center text-gray-500 mb-6">Enter your registered details to begin</p>
            
            <div id="login-msg" class="hidden mb-4 p-3 rounded text-sm text-center"></div>

            <form onsubmit="handleStudentLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Roll Number</label>
                    <input type="text" id="stu-roll-input" required placeholder="e.g. 101" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Student Name</label>
                    <input type="text" id="stu-name-input" required placeholder="e.g. Amit Kumar" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                    Verify & Start Exam
                </button>
            </form>
        </div>
    </div>

    <!-- STEP 2: LIVE EXAM INTERFACE (Initially Hidden) -->
    <div id="exam-container" class="hidden min-h-screen flex flex-col">
        <!-- Header / Navbar -->
        <nav class="bg-blue-800 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-10">
            <div>
                <h1 class="text-lg font-bold" id="header-student-info">Student Exam</h1>
                <p class="text-xs text-blue-200" id="header-subject-info">Subject: -</p>
            </div>
            <div class="bg-red-600 text-white px-4 py-2 rounded-lg text-lg font-mono font-bold shadow" id="exam-timer">
                00:00
            </div>
        </nav>

        <!-- Exam Questions Area -->
        <div class="max-w-4xl mx-auto p-6 w-full flex-grow space-y-6" id="questions-wrapper">
            <p class="text-center text-gray-500">Loading Exam Questions...</p>
        </div>

        <!-- Submit Button Footer -->
        <div class="bg-white border-t p-4 sticky bottom-0 text-center shadow-lg">
            <button onclick="submitExam()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-8 rounded-lg text-lg">
                Submit Exam Now
            </button>
        </div>
    </div>

    <!-- STEP 3: RESULT SCREEN (Initially Hidden) -->
    <div id="result-container" class="hidden flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center border-t-4 border-green-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Exam Submitted Successfully!</h2>
            <p class="text-gray-600 mb-6">Thank you. Your responses have been saved in the school portal database.</p>
            <div class="bg-green-50 p-4 rounded-lg border border-green-200 mb-6">
                <p class="text-sm text-green-800 font-semibold">Status: Completed</p>
            </div>
            <button onclick="location.reload()" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700">
                Back to Home
            </button>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi63JHOSRmn58ccbSOg82sJUOXUtTsumo",
            authDomain: "myexamportal-abf3f.firebaseapp.com",
            projectId: "myexamportal-abf3f",
            storageBucket: "myexamportal-abf3f.firebasestorage.app",
            messagingSenderId: "8464475917",
            appId: "1:8464475917:web:dd31ca0bba84a56ae17244",
            measurementId: "G-G0VRMX7EQT"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentStudent = null;
        let examTimerInterval = null;
        let fetchedQuestions = [];

        function showMsg(text, isError) {
            const msgBox = document.getElementById('login-msg');
            msgBox.innerText = text;
            msgBox.className = `mb-4 p-3 rounded text-sm text-center ${isError ? 'bg-red-100 text-red-700 border border-red-400' : 'bg-yellow-100 text-yellow-800'}`;
            msgBox.classList.remove('hidden');
        }

        async function handleStudentLogin(e) {
            e.preventDefault();
            const roll = document.getElementById('stu-roll-input').value.trim();
            const name = document.getElementById('stu-name-input').value.trim();

            showMsg("Verifying student & live exam status...", false);

            // 1. Check if Exam is Started by Admin
            const examCtrlDoc = await db.collection("exam_control").doc("current_exam").get();
            if (!examCtrlDoc.exists || !examCtrlDoc.data().isActive) {
                showMsg("❌ No Live Exam currently active! Please wait for admin to start.", true);
                return;
            }

            const examData = examCtrlDoc.data();

            // 2. Verify Student Registration
            const studentQuery = await db.collection("students").where("rollNo", "==", roll).get();
            if (studentQuery.empty) {
                showMsg("❌ Roll Number not registered by Teacher/Admin!", true);
                return;
            }

            currentStudent = { rollNo: roll, name: name, subject: examData.subject };

            // 3. Start Exam Interface
            document.getElementById('student-login-container').classList.add('hidden');
            document.getElementById('exam-container').classList.remove('hidden');
            
            document.getElementById('header-student-info').innerText = `${name} (Roll: ${roll})`;
            document.getElementById('header-subject-info').innerText = `Subject: ${examData.subject}`;

            startTimer(examData.duration || 30);
            loadQuestions();
        }

        function startTimer(durationMinutes) {
            let timerSeconds = durationMinutes * 60;
            const timerDisplay = document.getElementById('exam-timer');

            examTimerInterval = setInterval(() => {
                let mins = Math.floor(timerSeconds / 60);
                let secs = timerSeconds % 60;
                timerDisplay.innerText = `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (--timerSeconds < 0) {
                    clearInterval(examTimerInterval);
                    alert("Time's Up! Submitting exam automatically.");
                    submitExam();
                }
            }, 1000);
        }

        function loadQuestions() {
            const wrapper = document.getElementById('questions-wrapper');
            db.collection("question_bank").get().then(snapshot => {
                wrapper.innerHTML = "";
                if (snapshot.empty) {
                    wrapper.innerHTML = `<p class="text-center text-gray-500">No questions found in Question Bank.</p>`;
                    return;
                }

                let qIndex = 1;
                fetchedQuestions = [];
                snapshot.forEach(doc => {
                    const q = doc.data();
                    q.id = doc.id;
                    fetchedQuestions.push(q);

                    wrapper.innerHTML += `
                        <div class="bg-white p-6 rounded-lg shadow-md border">
                            <p class="font-bold text-gray-800 text-lg mb-4">Q${qIndex}. ${q.question}</p>
                            <div class="space-y-2">
                                <label class="flex items-center p-3 border rounded hover:bg-blue-50 cursor-pointer">
                                    <input type="radio" name="q_${doc.id}" value="A" class="mr-3"> (A) ${q.options?.A || ''}
                                </label>
                                <label class="flex items-center p-3 border rounded hover:bg-blue-50 cursor-pointer">
                                    <input type="radio" name="q_${doc.id}" value="B" class="mr-3"> (B) ${q.options?.B || ''}
                                </label>
                                <label class="flex items-center p-3 border rounded hover:bg-blue-50 cursor-pointer">
                                    <input type="radio" name="q_${doc.id}" value="C" class="mr-3"> (C) ${q.options?.C || ''}
                                </label>
                                <label class="flex items-center p-3 border rounded hover:bg-blue-50 cursor-pointer">
                                    <input type="radio" name="q_${doc.id}" value="D" class="mr-3"> (D) ${q.options?.D || ''}
                                </label>
                            </div>
                        </div>
                    `;
                    qIndex++;
                });
            });
        }

        function submitExam() {
            clearInterval(examTimerInterval);
            const answers = {};
            fetchedQuestions.forEach(q => {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                answers[q.id] = selected ? selected.value : null;
            });

            db.collection("exam_results").add({
                rollNo: currentStudent.rollNo,
                studentName: currentStudent.name,
                subject: currentStudent.subject,
                answers: answers,
                submittedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('exam-container').classList.add('hidden');
                document.getElementById('result-container').classList.remove('hidden');
            }).catch(err => alert("Error submitting exam: " + err.message));
        }
    </script>
</body>
</html>
