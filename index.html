<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - DAV Public School</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- Top DAV Header Banner -->
    <div class="bg-blue-800 text-white py-6 text-center shadow-md">
        <h1 class="text-3xl font-black tracking-wider">DAV PUBLIC SCHOOL</h1>
        <p class="text-xs text-blue-200 uppercase tracking-widest mt-1">Online Examination Portal</p>
    </div>

    <!-- LOGIN FORM CARD -->
    <div class="flex items-center justify-center mt-12 px-4">
        <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md border border-gray-100">
            <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">Student Login</h2>

            <div id="student-msg" class="hidden mb-4 p-3 rounded text-sm text-center"></div>

            <form onsubmit="handleStudentLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-xs font-bold mb-1">Roll Number</label>
                    <input type="text" id="stu-roll" required placeholder="Enter Roll No." class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-gray-700 text-xs font-bold mb-1">Password</label>
                    <input type="password" id="stu-pass" required placeholder="Enter Password" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 shadow flex items-center justify-center gap-2">
                    🔓 Start Examination
                </button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi63JHOSRmn58ccbSOg82sJUOXUtTsumo",
            authDomain: "myexamportal-abf3f.firebaseapp.com",
            projectId: "myexamportal-abf3f",
            storageBucket: "myexamportal-abf3f.firebasestorage.app",
            messagingSenderId: "8464475917",
            appId: "1:8464475917:web:dd31ca0bba84a56ae17244",
            measurementId: "G-G0VRMX7EQT"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleStudentLogin(e) {
            e.preventDefault();
            const roll = document.getElementById('stu-roll').value.trim();
            const pass = document.getElementById('stu-pass').value.trim();

            const snapshot = await db.collection("students").where("rollNo", "==", roll).get();
            if (snapshot.empty) {
                alert("Invalid Roll Number!");
                return;
            }

            let verified = false;
            snapshot.forEach(doc => {
                if (doc.data().password === pass) verified = true;
            });

            if (verified) {
                alert("Login Successful! Redirecting to Exam Engine...");
            } else {
                alert("Incorrect Password!");
            }
        }
    </script>
</body>
</html>
