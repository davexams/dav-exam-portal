<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - DAV Public School</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen p-3 md:p-6 select-none">

    <div class="max-w-6xl mx-auto space-y-4">

        <!-- 1. LOGIN SECTION -->
        <div id="login-section" class="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-200 max-w-md mx-auto space-y-4 my-10">
            <div class="text-center">
                <h1 class="text-xl font-black text-blue-900 tracking-wide">DAV PUBLIC SCHOOL</h1>
                <p class="text-xs text-gray-500 font-bold">Teacher Management Portal</p>
            </div>
            <form onsubmit="handleTeacherLogin(event)" class="space-y-3 text-xs">
                <div>
                    <label class="block font-bold text-gray-700 mb-1">Teacher Username / ID</label>
                    <input type="text" id="t-user" placeholder="Enter Username" required class="w-full p-2.5 border rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 font-semibold">
                </div>
                <div>
                    <label class="block font-bold text-gray-700 mb-1">Password</label>
                    <input type="password" id="t-pass" placeholder="Enter Password" required class="w-full p-2.5 border rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow transition">
                    🔑 Teacher Login
                </button>
            </form>
        </div>

        <!-- 2. MAIN TEACHER DASHBOARD -->
        <div id="dashboard-section" class="hidden space-y-4">

            <!-- Top Header Bar with Logout -->
            <div class="bg-white p-4 rounded-xl shadow border flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-black text-blue-900" id="teacher-welcome">Teacher Portal</h2>
                    <p class="text-xs text-gray-500 font-semibold">Question Bank & Assignment Control</p>
                </div>
                <!-- 🚪 LOGOUT BUTTON -->
                <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-600 text-white font-bold text-xs px-4 py-2 rounded-lg shadow transition flex items-center gap-1.5">
                    🚪 Logout
                </button>
            </div>

            <!-- Add Single Question Form -->
            <div class="bg-white p-5 rounded-xl shadow border space-y-3">
                <h3 class="font-bold text-sm text-blue-900 border-b pb-2">➕ Add New Question</h3>
                <form onsubmit="handleAddQuestion(event)" class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Class</label>
                        <select id="q-class" required class="w-full p-2 border rounded-lg bg-slate-50 font-bold text-blue-900">
                            <option value="Class 8">Class 8th</option>
                            <option value="Class 9">Class 9th</option>
                            <option value="Class 10" selected>Class 10th</option>
                            <option value="Class 11">Class 11th</option>
                            <option value="Class 12">Class 12th</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Subject</label>
                        <select id="q-subject" required class="w-full p-2 border rounded-lg bg-slate-50 font-bold text-blue-900">
                            <option value="Physics">Physics</option>
                            <option value="Chemistry">Chemistry</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Biology">Biology</option>
                            <option value="Science">Science</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block font-bold text-gray-700 mb-1">Chapter Name</label>
                        <input type="text" id="q-chapter" placeholder="e.g. Electricity / Motion" required class="w-full p-2 border rounded-lg bg-slate-50 font-semibold">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block font-bold text-gray-700 mb-1">Question Statement</label>
                        <textarea id="q-text" rows="2" required class="w-full p-2 border rounded-lg bg-slate-50" placeholder="Enter full question text..."></textarea>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Option A</label>
                        <input type="text" id="q-optA" required class="w-full p-2 border rounded-lg bg-slate-50">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Option B</label>
                        <input type="text" id="q-optB" required class="w-full p-2 border rounded-lg bg-slate-50">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Option C</label>
                        <input type="text" id="q-optC" required class="w-full p-2 border rounded-lg bg-slate-50">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Option D</label>
                        <input type="text" id="q-optD" required class="w-full p-2 border rounded-lg bg-slate-50">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Correct Answer Key</label>
                        <select id="q-correct" required class="w-full p-2 border rounded-lg bg-slate-50 font-bold text-blue-900">
                            <option value="A">Option A</option>
                            <option value="B">Option B</option>
                            <option value="C">Option C</option>
                            <option value="D">Option D</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg shadow transition">
                            💾 Save Question to Database
                        </button>
                    </div>
                </form>
            </div>

        </div>

    </div>

    <!-- Firebase Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi63JHOSRmn58ccbSOg82sJUOXUtTsumo",
            authDomain: "myexamportal-abf3f.firebaseapp.com",
            projectId: "myexamportal-abf3f",
            storageBucket: "myexamportal-abf3f.firebasestorage.app",
            messagingSenderId: "8464475917",
            appId: "1:8464475917:web:dd31ca0bba84a56ae17244"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function handleTeacherLogin(e) {
            e.preventDefault();
            const user = document.getElementById('t-user').value.trim();
            const pass = document.getElementById('t-pass').value.trim();

            if (user === "teacher" && pass === "dav123") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('teacher-welcome').innerText = `Welcome, Teacher (${user})`;
            } else {
                alert("❌ Invalid Teacher Username or Password!");
            }
        }

        function handleAddQuestion(e) {
            e.preventDefault();
            const payload = {
                class: document.getElementById('q-class').value,
                subject: document.getElementById('q-subject').value,
                chapter: document.getElementById('q-chapter').value.trim(),
                question: document.getElementById('q-text').value.trim(),
                options: {
                    A: document.getElementById('q-optA').value.trim(),
                    B: document.getElementById('q-optB').value.trim(),
                    C: document.getElementById('q-optC').value.trim(),
                    D: document.getElementById('q-optD').value.trim()
                },
                correctAnswer: document.getElementById('q-correct').value,
                selectedForExam: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection("question_bank").add(payload).then(() => {
                alert("🎉 Question added successfully!");
                document.getElementById('q-text').value = "";
                document.getElementById('q-optA').value = "";
                document.getElementById('q-optB').value = "";
                document.getElementById('q-optC').value = "";
                document.getElementById('q-optD').value = "";
            }).catch(err => {
                alert("Error adding question: " + err.message);
            });
        }

        function handleLogout() {
            if (confirm("Are you sure you want to LOGOUT from Teacher Portal?")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
